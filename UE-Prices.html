<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UE Prices</title>

<link rel="icon" href="https://cdn3.emoji.gg/emojis/69266-archnemesis.png">

<style>
:root {
    --bg-color: #0b111f;
    --container-bg: rgba(15,25,50,0.7);
    --accent-color: #64ffda;
    --btn-color: #2a7a5e;   /* Purchase button color / border */
    --btn-hover: #3dbb96;
    --text-color: #ffffff;
}

/* General */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
}

/* Page header with glow */
.header-container {
    text-align: center;
    margin-bottom: 50px;
    padding: 20px 40px;
    border: 5px solid var(--btn-color); /* thicker border */
    border-radius: 20px;
    box-shadow: 0 0 15px var(--btn-color), 0 0 30px var(--btn-color), 0 0 45px var(--btn-color); /* glow */
    transition: box-shadow 0.3s ease;
}

/* Header text */
.header-container h1 {
    font-size: 3rem;
    font-weight: 900;  
    color: var(--accent-color);
    letter-spacing: 0.6rem;
    margin-bottom: 30px;
    text-shadow:
        0 0 6px rgba(100,255,218,0.6),
        0 0 12px rgba(100,255,218,0.4),
        0 0 18px rgba(100,255,218,0.3);
}

/* Logo group (three images side by side) */
.logo-group {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px; /* space between images */
}

/* All three logos same size */
.logo-img,
.katana-img,
.crossbow-img {
    width: 250px;
    height: auto;
}

/* Grid layout */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px 20px;
    width: 100%;
    max-width: 900px;
    justify-items: center;
}

/* Product cards */
.card {
    background: var(--container-bg);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 220px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.6);
}

/* Product title */
.card h2 {
    color: var(--accent-color);
    margin-bottom: 15px;
    font-size: 1.2rem;
    font-weight: 900;
}

/* Product image */
.card img {
    width: 100px;
    height: auto;
    margin-bottom: 20px;
}

/* Purchase button */
.card a {
    display: inline-block;
    padding: 10px 25px;
    background: var(--btn-color);
    color: #fff;
    font-weight: 700;
    text-decoration: none;
    border-radius: 8px;
    border: 2px solid var(--btn-color);
    transition: background 0.3s ease, border-color 0.3s ease;
}

.card a:hover {
    background: var(--btn-hover);
    border-color: var(--btn-hover);
}

/* Price */
.card .price {
    margin-top: 10px;
    font-weight: 900; /* bold */
    color: var(--btn-color); /* matches purchase button border */
    font-size: 1.1rem;
}

/* Responsive */
@media(max-width: 800px) {
    .header-container h1 { font-size: 2.5rem; letter-spacing: 0.5rem; }
    .logo-img,
    .katana-img,
    .crossbow-img { width: 200px; }
}

@media(max-width: 600px) {
    .header-container h1 { font-size: 2rem; letter-spacing: 0.3rem; }
    .logo-img,
    .katana-img,
    .crossbow-img { width: 150px; }
    .card { width: 180px; padding: 20px; }
    .card img { width: 80px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header-container">
    <h1>UE ARCHNEM FIGS</h1>
    <div class="logo-group">
        <img class="crossbow-img" src="https://static.wikia.nocookie.net/robloxrivals/images/4/4e/Archcrossbowrender.png/revision/latest/thumbnail/width/360/height/360?cb=20251221222707" alt="Arch Crossbow">
        <img class="logo-img" src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png" alt="MATRIX Logo">
        <img class="katana-img" src="https://static.wikia.nocookie.net/robloxrivals/images/2/22/Arch_Katana_ds.png/revision/latest?cb=20251003212725" alt="Arch Katana">
    </div>
</div>

<!-- PRODUCT CARDS -->
<div class="grid-container">

    <div class="card">
        <h2>UE Legit Fig</h2>
        <img src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png" alt="UE Legit Fig">
        <a href="#">Purchase</a>
        <div class="price">$2.50</div>
    </div>

    <div class="card">
        <h2>UE Sniper Fig</h2>
        <img src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png" alt="MATRIX Sniper Fig">
        <a href="#">Purchase</a>
        <div class="price">$2.99</div>
    </div>

    <div class="card">
        <h2>UE Rage Fig</h2>
        <img src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png" alt="MATRIX Rage Fig">
        <a href="#">Purchase</a>
        <div class="price">$4.99</div>
    </div>

</div>

</body>
</html>
