<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUNDLE Prices</title>

<link rel="icon" href="https://cdn3.emoji.gg/emojis/69266-archnemesis.png">

<style>
:root {
    --bg-color: #0b111f;
    --container-bg: rgba(15,25,50,0.7);
    --accent-color: #64ffda;
    --btn-color: #2a7a5e;
    --btn-hover: #3dbb96;
    --text-color: #ffffff;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px 20px;
}

.header-container {
    text-align: center;
    margin-bottom: 50px;
    padding: 20px 40px;
    border: 5px solid var(--btn-color);
    border-radius: 20px;
    box-shadow: 0 0 15px var(--btn-color), 0 0 30px var(--btn-color), 0 0 45px var(--btn-color);
}

.header-container h1 {
    font-size: 3rem;
    font-weight: 900;  
    color: var(--accent-color);
    letter-spacing: 0.6rem;
    margin-bottom: 30px;
    text-shadow:
        0 0 6px rgba(100,255,218,0.6),
        0 0 12px rgba(100,255,218,0.4),
        0 0 18px rgba(100,255,218,0.3);
}

.logo-group {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

.logo-img,
.katana-img,
.crossbow-img {
    width: 250px;
    height: auto;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px 20px;
    width: 100%;
    max-width: 900px;
    justify-items: center;
}

.card {
    background: var(--container-bg);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 220px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 25px 50px rgba(0,0,0,0.6);
}

.card h2 {
    color: var(--accent-color);
    margin-bottom: 15px;
    font-size: 1.2rem;
    font-weight: 900;
}

.card img {
    width: 100px;
    height: auto;
    margin-bottom: 20px;
}

.card a {
    display: inline-block;
    padding: 10px 25px;
    background: var(--btn-color);
    color: #fff;
    font-weight: 700;
    text-decoration: none;
    border-radius: 8px;
    border: 2px solid var(--btn-color);
    transition: background 0.3s ease, border-color 0.3s ease;
}

.card a:hover {
    background: var(--btn-hover);
    border-color: var(--btn-hover);
}

.card .price {
    margin-top: 10px;
    font-weight: 900;
    color: var(--btn-color);
    font-size: 1.1rem;
}

@media(max-width: 800px) {
    .header-container h1 { font-size: 2.5rem; letter-spacing: 0.5rem; }
    .logo-img,
    .katana-img,
    .crossbow-img { width: 200px; }
}

@media(max-width: 600px) {
    .header-container h1 { font-size: 2rem; letter-spacing: 0.3rem; }
    .logo-img,
    .katana-img,
    .crossbow-img { width: 150px; }
    .card { width: 180px; padding: 20px; }
    .card img { width: 80px; }
}
</style>
</head>
<body>

<div class="header-container">
    <h1>BUNDLES</h1>
    <div class="logo-group">
        <img class="logo-img" src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png">
    </div>
</div>

<div class="grid-container">

    <div class="card">
        <h2>MATRIX BUNDLE</h2>
        <img src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png">
        <a href="https://discord.gg/FDmgmwRK" target="_blank">Purchase</a>
        <div class="price">$4.50</div>
    </div>

    <div class="card">
        <h2>MATCHA Bundle</h2>
        <img src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png">
        <a href="https://discord.gg/FDmgmwRK" target="_blank">Purchase</a>
        <div class="price">$5.75</div>
    </div>

    <div class="card">
        <h2>UE Bundle</h2>
        <img src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png">
        <a href="https://discord.gg/FDmgmwRK" target="_blank">Purchase</a>
        <div class="price">$7.99</div>
    </div>

    <div class="card">
        <h2>KHOOK Bundle</h2>
        <img src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png">
        <a href="https://discord.gg/FDmgmwRK" target="_blank">Purchase</a>
        <div class="price">$5.99</div>
    </div>

</div>

</body>
</html>
