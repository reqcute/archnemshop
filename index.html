<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHNEM FIGS | Premium Access</title>
    <style>
        :root {
            --bg-color: #050a14; 
            --container-bg: rgba(10, 25, 47, 0.6);
            --accent-color: #64ffda;
            --text-main: #ffffff;
            --nav-bg: rgba(5, 10, 20, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #0a192f 0%, #050a14 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            width: 100%;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(100, 255, 218, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.15rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .nav-links a:hover {
            color: var(--accent-color);
            opacity: 1;
            text-shadow: 0 0 10px rgba(100, 255, 218, 0.5);
        }

        /* Main Content Container */
        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
            width: 100%;
        }

        .container {
            text-align: center;
            max-width: 550px;
            width: 85%;
            padding: 60px 40px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: fadeInScale 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 1rem;
            margin-bottom: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff, #64ffda);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .image-container {
            margin-bottom: 3rem;
            display: flex;
            justify-content: center;
        }

        .main-image {
            max-width: 300px;
            width: 100%;
            height: auto;
            border-radius: 20px;
            /* Applying a high-end glow to the specific item */
            filter: drop-shadow(0 0 25px rgba(100, 255, 218, 0.2));
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .main-image:hover {
            transform: scale(1.1) translateY(-10px);
            filter: drop-shadow(0 0 35px rgba(100, 255, 218, 0.4));
        }

        .payment-link {
            display: inline-block;
            padding: 22px 60px;
            background-color: var(--accent-color);
            color: #050a14;
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            border-radius: 15px;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 0.25rem;
            box-shadow: 0 10px 30px rgba(100, 255, 218, 0.2);
        }

        .payment-link:hover {
            background-color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(100, 255, 218, 0.4);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 650px) {
            .nav-links { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .nav-links a { font-size: 0.65rem; letter-spacing: 0.1rem; }
            h1 { font-size: 1.8rem; letter-spacing: 0.5rem; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="https://discord.gg/ygXkVTpU">Discord</a></li>
            <li><a href="#">Matrix</a></li>
            <li><a href="#">Matcha</a></li>
            <li><a href="#">UE Support</a></li>
            <li><a href="#">Reviews</a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <div class="container">
            <h1>ARCHNEM FIGS</h1>

            <div class="image-container">
                <img src="https://tr.rbxcdn.com/183dbb72740280f53bf3363065a7f7d1/420/420/Image/Png" alt="ARCHNEM Item" class="main-image">
            </div>

            <a href="https://discord.gg/ygXkVTpU" class="payment-link">
                Proceed to Payment
            </a>
        </div>
    </div>

</body>
</html>
