<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHNEM FIGS | Premium Access</title>
    <style>
        :root {
            --bg-color: #050a14; 
            --container-bg: rgba(10, 25, 47, 0.6);
            --accent-color: #64ffda;
            --text-main: #ffffff;
            --nav-bg: rgba(5, 10, 20, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #0a192f 0%, #050a14 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        .navbar {
            width: 100%;
            height: 60px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        /* Main Content Container */
        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 60px; /* Accounts for fixed navbar height */
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 90%;
            padding: 50px 30px;
            background: var(--container-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInScale 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 0.8rem;
            margin-bottom: 2.5rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .main-image {
            max-width: 220px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.4));
            margin-bottom: 3rem;
            transition: transform 0.4s ease;
        }

        .main-image:hover {
            transform: scale(1.05);
        }

        .payment-link {
            display: inline-block;
            padding: 20px 45px;
            background-color: var(--accent-color);
            color: #050a14;
            text-decoration: none;
            font-weight: 700;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
        }

        .payment-link:hover {
            background-color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(100, 255, 218, 0.3);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 600px) {
            .nav-links { gap: 12px; }
            .nav-links a { font-size: 0.7rem; letter-spacing: 0.05rem; }
            h1 { font-size: 1.6rem; letter-spacing: 0.4rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="https://discord.gg/ygXkVTpU">Discord</a></li>
            <li><a href="#">Matrix</a></li>
            <li><a href="#">Matcha</a></li>
            <li><a href="#">UE Support</a></li>
            <li><a href="#">Reviews</a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <div class="container">
            <h1>ARCHNEM FIGS</h1>

            <img src="image_50cd67.png" alt="ARCHNEM Logo" class="main-image">

            <br>

            <a href="https://discord.gg/ygXkVTpU" class="payment-link">
                Proceed to Payment
            </a>
        </div>
    </div>

</body>
</html>
