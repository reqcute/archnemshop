<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHNEM FIGS | Premium Access</title>
    <style>
        :root {
            --bg-color: #050a14; 
            --container-bg: rgba(10, 25, 47, 0.6);
            --accent-color: #64ffda; /* Original scroll color */
            --text-darker: #4adbb5; /* A "tad darker" version for the header */
            --text-main: #ffffff;
            --nav-bg: rgba(5, 10, 20, 0.9);
        }

        /* Enables smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at center, #0a192f 0%, #050a14 100%);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        .navbar {
            width: 100%;
            height: 70px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(100, 255, 218, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            gap: 45px; 
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.15rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        .nav-links a:hover {
            color: var(--accent-color);
            opacity: 1;
            text-shadow: 0 0 15px rgba(100, 255, 218, 0.6);
        }

        /* Main Content Container */
        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
            width: 100%;
            position: relative;
            min-height: calc(100vh - 80px);
        }

        .container {
            text-align: center;
            max-width: 480px; 
            width: 85%;
            padding: 50px 35px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: fadeInScale 1s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 0.8rem; 
            margin-bottom: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            /* Using the darker variable here */
            color: var(--text-darker);
            text-shadow: 0 0 8px rgba(74, 219, 181, 0.3);
        }

        .image-container {
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: center;
        }

        .main-image {
            max-width: 280px;
            width: 100%;
            height: auto;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .main-image:hover {
            transform: scale(1.05);
        }

        /* Enlarged Scroll Down Indicator */
        .scroll-down {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--accent-color); /* Kept original bright color for the scroll indicator */
            opacity: 0.8;
            transition: all 0.3s ease;
            animation: bounce 2s infinite;
        }

        .scroll-down span {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.3rem;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .scroll-arrow {
            width: 28px;
            height: 28px;
            border-right: 3px solid var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
            transform: rotate(45deg);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 768px) {
            .nav-links { gap: 20px; flex-wrap: wrap; justify-content: center; }
            h1 { font-size: 1.6rem; letter-spacing: 0.4rem; }
            .container { padding: 35px 25px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="https://discord.gg/ygXkVTpU">Discord</a></li>
            <li><a href="#">Matrix</a></li>
            <li><a href="#">Matcha</a></li>
            <li><a href="#">UE</a></li>
            <li><a href="#">Support</a></li>
            <li><a href="#">Reviews</a></li>
        </ul>
    </nav>

    <div class="content-wrapper">
        <div class="container">
            <h1>ARCHNEM FIGS</h1>

            <div class="image-container">
                <img src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png" alt="ARCHNEM Logo" class="main-image">
            </div>
        </div>

        <a href="#more-info" class="scroll-down">
            <span>Scroll</span>
            <div class="scroll-arrow"></div>
        </a>
    </div>

    <div id="more-info" style="height: 100vh; width: 100%;"></div>

</body>
</html>
