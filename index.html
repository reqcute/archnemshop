<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHNEM FIGS | Premium Access</title>

<style>
:root {
    --bg-color: #050a14;
    --container-bg: rgba(10,25,47,0.6);
    --accent-color: #64ffda;
    --text-darker: #4adbb5;
    --text-main: #ffffff;
    --nav-bg: rgba(5,10,20,0.9);
}

/* GENERAL STYLES */
html { scroll-behavior: smooth; }
body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background: radial-gradient(circle at center,#0a192f 0%,#050a14 100%);
    color: var(--text-main);
}

/* NAVBAR */
.navbar {
    width: 100%;
    height: 70px;
    background: var(--nav-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(100,255,218,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    top: 0;
    z-index: 1000;
}
.nav-links {
    display: flex;
    gap: 45px;
    list-style: none;
}
.nav-links a {
    text-decoration: none;
    color: var(--text-main);
    font-size: .8rem;
    font-weight: 700;
    letter-spacing: .15rem;
    text-transform: uppercase;
    opacity: .7;
}
.nav-links a:hover {
    color: var(--accent-color);
    opacity: 1;
}

/* HERO SECTION */
.content-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    padding-top: 80px;
    width: 100%;
    position: relative;
    min-height: 100vh;
}
.container {
    text-align: center;
    max-width: 480px;
    width: 85%;
    padding: 50px 35px;
    background: var(--container-bg);
    backdrop-filter: blur(20px);
    border-radius: 35px;
    box-shadow: 0 30px 60px rgba(0,0,0,.6);
}

/* ARCHNEM FIGS TITLE */
h1 {
    font-size: 2.2rem;
    letter-spacing: .8rem;
    margin-bottom: 1.8rem;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--text-darker);
    text-shadow:
        0 2px 4px rgba(0,0,0,.9),
        0 8px 18px rgba(0,0,0,.8),
        0 0 6px rgba(0,0,0,.4);
}

.main-image {
    max-width: 280px;
    margin-bottom: 15px;
}

/* SCROLL BUTTON */
.scroll-down {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: var(--accent-color);
    opacity: .8;
    animation: bounce 2s infinite;
}
.scroll-down span {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: .3rem;
    margin-bottom: 12px;
    font-weight: 800;
}
.scroll-arrow {
    width: 28px;
    height: 28px;
    border-right: 3px solid var(--accent-color);
    border-bottom: 3px solid var(--accent-color);
    transform: rotate(45deg);
}

/* SECTIONS */
.section {
    min-height: 100vh;
    text-align: center;
    padding-top: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.section-text {
    font-size: 2.3rem;
    letter-spacing: .8rem;
    font-weight: 900;
    color: #3bcaa5;
    margin-bottom: 60px;
    text-shadow:
        0 2px 4px rgba(0,0,0,.9),
        0 8px 18px rgba(0,0,0,.8),
        0 0 6px rgba(0,0,0,.4); /* DARK GLOW LIKE ARCHNEM FIGS */
}

/* GRID & BOXES */
.grid {
    display: flex;
    justify-content: center;
    gap: 35px;
    flex-wrap: wrap;
    width: 80%;
    max-width: 900px;
}
.box {
    padding: 30px 20px;
    background: var(--container-bg);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,.05);
    box-shadow: 0 20px 40px rgba(0,0,0,.5);
    transition: transform .3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.box:hover {
    transform: translateY(-8px);
}

/* PRODUCT TITLES DARK GLOW */
.box h3 {
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: .2rem;
    color: var(--text-darker);
    margin-bottom: 15px;
    text-shadow:
        0 2px 3px rgba(0,0,0,.9),
        0 5px 12px rgba(0,0,0,.8),
        0 0 5px rgba(0,0,0,.2);
}
.darker { color:#1f7a66; }

/* PRODUCT IMAGES */
.box img {
    width: 150px;
    height: auto;
    margin-bottom: 12px;
}

/* PURCHASE BUTTON */
.purchase-btn {
    display: inline-block;
    padding: 10px 20px;
    background: #2a7a5e; /* darker green */
    color: #ffffff;
    font-weight: 700;
    text-decoration: none;
    border-radius: 8px;
    margin-top: -5px;
    transition: background 0.3s;
}
.purchase-btn:hover {
    background: #3dbb96;
}

/* PRICE TAG SAME COLOR AS BUTTON WITH GLOW */
.price {
    margin-top: 6px;
    font-size: 1.1rem;
    font-weight: 800;
    color: #2a7a5e; /* same as button */
    text-shadow:
        0 0 4px rgba(42,122,94,0.5),
        0 0 8px rgba(42,122,94,0.3);
}

/* SCROLL ANIMATION */
@keyframes bounce {
0%,20%,50%,80%,100% { transform:translateX(-50%) translateY(0); }
40% { transform:translateX(-50%) translateY(-10px); }
60% { transform:translateX(-50%) translateY(-5px); }
}

@media (max-width:900px) {
.grid { flex-direction: column; align-items: center; }
}
</style>
</head>
