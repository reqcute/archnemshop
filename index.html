<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archnem Shop</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="https://cdn3.emoji.gg/emojis/69266-archnemesis.png">

<style>
:root {
    --bg-color: #050a14;
    --container-bg: rgba(10,25,47,0.6);
    --accent-color: #64ffda;
    --glow-color: rgba(50,255,200,0.5);
    --text-main: #ffffff;
    --nav-bg: rgba(5,10,20,0.9);
}

html { scroll-behavior: smooth; }

body {
    margin:0;
    padding:0;
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at center,#0a192f 0%,#050a14 100%);
    color:var(--text-main);
}

/* NAVBAR */
.navbar {
    width:100%;
    height:70px;
    background:var(--nav-bg);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(100,255,218,0.1);
    display:flex;
    justify-content:center;
    align-items:center;
    position:fixed;
    top:0;
    z-index:1000;
}

.nav-links {
    display:flex;
    justify-content: space-between;
    align-items:center;
    width:900px;
    list-style:none;
    padding:0;
    margin:0;
}

.nav-links a {
    text-decoration:none;
    color:var(--text-main);
    font-size:.9rem;
    font-weight:700;
    letter-spacing:.15rem;
    text-transform:uppercase;
    opacity:.85;
    transition: color 0.3s;
}

.nav-links a:hover {
    color:var(--accent-color);
}

/* HERO */
.content-wrapper {
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:80px;
    width:100%;
    position:relative;
    min-height:100vh;
}

.container {
    text-align:center;
    max-width:480px;
    width:85%;
    padding:50px 35px;
    background:var(--container-bg);
    backdrop-filter:blur(20px);
    border-radius:35px;
    border: 3px solid var(--accent-color);
    box-shadow:
        0 0 12px var(--glow-color),
        0 0 25px var(--glow-color),
        0 0 40px var(--glow-color);
}

/* GLOW TITLES */
h1, .glow-title {
    font-size:2.2rem;
    letter-spacing:.8rem;
    margin-bottom:1.8rem;
    font-weight:900;
    text-transform:uppercase;
    color:var(--accent-color);
    text-shadow:
        0 0 4px rgba(100,255,218,0.6),
        0 0 10px rgba(100,255,218,0.4),
        0 0 18px rgba(100,255,218,0.3);
    animation: glowPulse 3s infinite alternate;
}

/* Logo row */
.logo-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

.main-image {
    width: 240px;
    height: auto;
    border-radius: 20px;
}

.main-image-small {
    width: 120px;
    height: auto;
    border-radius: 12px;
    cursor: pointer;
}

/* SCROLL BUTTON */
.scroll-down {
    position:absolute;
    bottom:140px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:var(--accent-color);
    opacity:.8;
    animation:bounce 2s infinite;
}

.scroll-down span {
    font-size:1rem;
    text-transform:uppercase;
    letter-spacing:.3rem;
    margin-bottom:12px;
    font-weight:800;
}

.scroll-arrow {
    width:28px;
    height:28px;
    border-right:3px solid var(--accent-color);
    border-bottom:3px solid var(--accent-color);
    transform:rotate(45deg);
}

/* ANIMATIONS */
@keyframes bounce {
0%,20%,50%,80%,100{transform:translateX(-50%) translateY(0);}
40%{transform:translateX(-50%) translateY(-10px);}
60%{transform:translateX(-50%) translateY(-5px);}
}

@keyframes glowPulse {
from{
    text-shadow:
        0 0 4px rgba(100,255,218,0.5),
        0 0 8px rgba(100,255,218,0.4),
        0 0 14px rgba(100,255,218,0.3);
}
to{
    text-shadow:
        0 0 6px rgba(100,255,218,0.7),
        0 0 12px rgba(100,255,218,0.5),
        0 0 20px rgba(100,255,218,0.35);
}
}

/* SECOND PAGE */
#second-page {
    min-height:100vh;
    width:100%;
    background: linear-gradient(180deg, #0a192f 0%, #050a14 100%);
    padding-top:100px;
    color:var(--accent-color);
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* GRID */
.boxes-grid-two-rows {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px 30px;
    width: 90%;
    max-width: 1200px;
    margin-bottom: 50px;
}

.box {
    width: 200px;
    padding: 35px 25px;
    background: var(--container-bg);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.05);
    box-shadow: 0 20px 40px rgba(0,0,0,.5);
    transition: transform .3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.box:hover { transform: translateY(-8px); }

.box h3 {
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--accent-color);
    margin-bottom: 20px;
}

.box img {
    width: 140px;
    margin-bottom: 20px;
}

.purchase-btn {
    padding: 12px 30px;
    background: #2a7a5e;
    color: #fff;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 700;
}

.purchase-btn:hover { background: #3dbb96; }

.new-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: .8rem;
}
</style>
</head>

<body>

</ul>
</nav>

<!-- HERO -->
<div class="content-wrapper">
  <div class="container">
    <h1>ARCHNEM FIGS</h1>
    <div class="logo-row">
        <img src="https://cdn3.emoji.gg/emojis/69266-archnemesis.png" class="main-image">
        <a href="https://discord.gg/br63xgj67J" target="_blank">
          <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/discord-color-icon.png" class="main-image-small">
        </a>
    </div>
  </div>

  <a href="#second-page" class="scroll-down">
    <span>Scroll</span>
    <div class="scroll-arrow"></div>
  </a>
</div>

</body>
</html>
