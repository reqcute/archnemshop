<style>
:root {
    --bg-color: #050a14;
    --container-bg: rgba(10,25,47,0.6);
    --accent-color: #64ffda;
    --glow-color: rgba(50,255,200,0.5);
    --text-main: #ffffff;
    --nav-bg: rgba(5,10,20,0.9);
}

html { scroll-behavior: smooth; }

body {
    margin:0;
    padding:0;
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at center,#0a192f 0%,#050a14 100%);
    color:var(--text-main);
}

/* NAVBAR */
.navbar {
    width:100%;
    height:70px;
    background:var(--nav-bg);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(100,255,218,0.1);
    display:flex;
    justify-content:center;
    align-items:center;
    position:fixed;
    top:0;
    z-index:1000;
}

.nav-links {
    display:flex;
    justify-content: space-between;
    align-items:center;
    width:900px;
    list-style:none;
    padding:0;
    margin:0;
}

.nav-links a {
    text-decoration:none;
    color:var(--text-main);
    font-size:.9rem;
    font-weight:700;
    letter-spacing:.15rem;
    text-transform:uppercase;
    opacity:.85;
    transition: color 0.3s;
}

.nav-links a:hover {
    color:var(--accent-color);
}

/* HERO */
.content-wrapper {
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:80px;
    width:100%;
    position:relative;
    min-height:100vh;
}

.container {
    text-align:center;
    max-width:480px;
    width:85%;
    padding:50px 35px;
    background:var(--container-bg);
    backdrop-filter:blur(20px);
    border-radius:35px;
    border: 3px solid var(--accent-color);
    box-shadow:
        0 0 12px var(--glow-color),
        0 0 25px var(--glow-color),
        0 0 40px var(--glow-color);
}

/* GLOW TITLES */
h1, .glow-title {
    font-size:2.2rem;
    letter-spacing:.8rem;
    margin-bottom:1.8rem;
    font-weight:900;
    text-transform:uppercase;
    color:var(--accent-color);
    text-shadow:
        0 0 4px rgba(100,255,218,0.6),
        0 0 10px rgba(100,255,218,0.4),
        0 0 18px rgba(100,255,218,0.3);
    animation: glowPulse 3s infinite alternate;
}

/* Logo row */
.logo-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

.main-image {
    width: 240px;
    height: auto;
    border-radius: 20px;
}

.main-image-small {
    width: 120px;
    height: auto;
    border-radius: 12px;
    cursor: pointer;
}

/* SCROLL BUTTON */
.scroll-down {
    position:absolute;
    bottom:140px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
    color:var(--accent-color);
    opacity:.8;
    animation:bounce 2s infinite;
}

.scroll-down span {
    font-size:1rem;
    text-transform:uppercase;
    letter-spacing:.3rem;
    margin-bottom:12px;
    font-weight:800;
}

.scroll-arrow {
    width:28px;
    height:28px;
    border-right:3px solid var(--accent-color);
    border-bottom:3px solid var(--accent-color);
    transform:rotate(45deg);
}

/* ANIMATIONS */
@keyframes bounce {
0%,20%,50%,80%,100{transform:translateX(-50%) translateY(0);}
40%{transform:translateX(-50%) translateY(-10px);}
60%{transform:translateX(-50%) translateY(-5px);}
}

@keyframes glowPulse {
from{
    text-shadow:
        0 0 4px rgba(100,255,218,0.5),
        0 0 8px rgba(100,255,218,0.4),
        0 0 14px rgba(100,255,218,0.3);
}
to{
    text-shadow:
        0 0 6px rgba(100,255,218,0.7),
        0 0 12px rgba(100,255,218,0.5),
        0 0 20px rgba(100,255,218,0.35);
}
}

/* SECOND PAGE - 2 ROWS LAYOUT */
#second-page {
    min-height:100vh;
    width:100%;
    background: linear-gradient(180deg, #0a192f 0%, #050a14 100%);
    padding-top:100px;
    color:var(--accent-color);
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* TWO ROW GRID */
.boxes-grid-two-rows {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: auto;
    gap: 40px 30px;
    justify-content: center;
    width: 90%;
    max-width: 1200px;
    margin-bottom: 50px;
}

.box {
    width: 200px;
    padding: 35px 25px;
    background: var(--container-bg);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,.05);
    box-shadow: 0 20px 40px rgba(0,0,0,.5);
    transition: transform .3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
}

.box:hover { transform: translateY(-8px); }

.box h3 {
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: .1rem;
    color: var(--accent-color);
    text-shadow:
        0 0 6px rgba(100,255,218,0.6),
        0 0 10px rgba(100,255,218,0.4),
        0 0 18px rgba(100,255,218,0.3);
    margin-bottom: 20px;
    animation: glowPulse 3s infinite alternate;
}

.box img.product-image {
    width: 140px;
    height: auto;
    margin-bottom: 20px;
}

.purchase-btn {
    display: inline-block;
    padding: 12px 30px;
    font-size: 1rem;
    background: #2a7a5e;
    color: #ffffff;
    font-weight: 700;
    text-decoration: none;
    border-radius: 8px;
    transition: background .3s;
}

.purchase-btn:hover { background: #3dbb96; }

.new-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background-color: #ff3b3b;
    color: #fff;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 5px 8px;
    border-radius: 6px;
    text-transform: uppercase;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

@media(max-width:900px){
    .boxes-grid-two-rows { grid-template-columns: repeat(2, 1fr); gap: 25px 20px; }
    .box{width: 160px; padding: 25px 20px;}
    .box h3{font-size: 1.3rem;}
    .box img.product-image{width: 120px;}
    .purchase-btn{padding: 10px 25px; font-size: 0.9rem;}
    .new-badge{font-size:0.7rem; padding:4px 7px;}
}
</style>
</head>
